{% extends "base.html" %}
{% block content %}
<div class="players-page">
  <h2 class="section-title">▸ ALL PLAYERS</h2>
  <div class="players-grid">
    {% for p in players %}
    <div class="player-mini pixel-border">
      <div class="mini-avatar mini-avatar-emoji">{{ p.avatar or '🧑' }}</div>
      <div class="mini-info">
        <a href="{{ url_for('profile', username=p.username) }}"><strong>{{ p.username }}</strong></a>
        <span class="mini-level">#{{ p.id }} · LV.{{ p.level }} {{ p.title }}</span>
      </div>
      <div class="mini-action">
        {% if p.id not in friend_ids %}
        <button class="pixel-btn pixel-border btn-small" onclick="sendFriend({{ p.id }})">➕</button>
        {% else %}
        <span class="friend-badge">🤝</span>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
<script>
async function sendFriend(userId) {
  const resp = await fetch('/friend/send/' + userId, { method: 'POST' });
  const data = await resp.json();
  if (data.success) {
    location.reload();
  } else {
    alert(data.message);
  }
}
</script>
{% endblock %}
