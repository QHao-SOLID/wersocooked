{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="pixel-card pixel-border">
    <h1 class="pixel-title">▸ SIGN UP</h1>
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" class="pixel-input pixel-border" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" class="pixel-input pixel-border" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" class="pixel-input pixel-border" required>
      </div>
      <div class="field">
        <label>Choose your avatar</label>
        <div class="emoji-picker">
          <input type="hidden" name="avatar" id="avatar-val" value="🧑">
          <div class="emoji-grid">
            {% for e in ['🧑','👩','🧔','🧙','🧝','🦸','👨‍💻','👩‍🎓','👩‍🔬','🧑‍🎨','🧑‍🔧','👨‍🚀'] %}
            <span class="emoji-opt {% if e == '🧑' %}selected{% endif %}" data-emoji="{{ e }}" onclick="selectEmoji(this)">{{ e }}</span>
            {% endfor %}
          </div>
        </div>
      </div>
      <button type="submit" class="pixel-btn pixel-border">▶ CREATE</button>
    </form>
    <p class="auth-link">Already a hero? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
<script>
function selectEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('avatar-val').value = el.dataset.emoji;
}
</script>
{% endblock %}
